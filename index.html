<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Counter App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #counter {
            font-size: 40px;
            margin: 20px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .increase {
            background-color: #28a745;
            color: white;
        }

        .decrease {
            background-color: #dc3545;
            color: white;
        }

        .reset {
            background-color: #6c757d;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Counter App</h1>
    <div id="counter">0</div>
    <button class="increase" onclick="changeCount(1)">Increase</button>
    <button class="decrease" onclick="changeCount(-1)">Decrease</button>
    <button class="reset" onclick="resetCount()">Reset</button>
</div>

<script>
    let count = 0;

    function changeCount(value) {
        count += value;
        document.getElementById("counter").innerText = count;
    }

    function resetCount() {
        count = 0;
        document.getElementById("counter").innerText = count;
    }
</script>

</body>
</html>
